# config\alertmanager\alertmanager.yml
global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "host"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "agent-webhook"

receivers:
  - name: "agent-webhook"
    webhook_configs:
      - url: "http://host.docker.internal:8000/alert"
        send_resolved: true