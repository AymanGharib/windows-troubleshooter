# config\prometheus\prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "windows-desktop"
    static_configs:
      - targets: ["host.docker.internal:9182"]
        labels:
          host: "my-desktop"
          job:  "windows-desktop"
          env:  "dev"