groups:

  - name: windows_processes
    rules:

      - alert: ProcessDown
        expr: |
          absent_over_time(windows_process_cpu_time_total{
            mode="user",
            process=~"(?i)^Powershell$"
          }[1m])
        for: 30s
        labels:
          severity: critical
          type: process
          process: Powershell
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "Powershell process is missing"

      - alert: ProcessHighCPU
        expr: |
          rate(windows_process_cpu_time_total{
            mode="user",
            process=~"(?i)^Powershell$"
          }[2m]) * 100 > 60
        for: 3m
        labels:
          severity: warning
          type: process_cpu
          process: Powershell
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "Process Powershell using >60% CPU"

      - alert: ProcessHighMemory
        expr: |
          windows_process_working_set_bytes{
            process=~"(?i)^Powershell$"
          } > 1073741824
        for: 3m
        labels:
          severity: warning
          type: process_memory
          process: Powershell
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "Process Powershell using >1GB RAM"

