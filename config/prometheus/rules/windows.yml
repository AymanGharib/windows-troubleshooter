# config\prometheus\rules\windows.yml
groups:

  - name: windows_resources
    rules:

      - alert: HighCPU
        expr: |
          100 - (avg(rate(windows_cpu_time_total{mode="idle"}[2m])) * 100) > 80
        for: 1m
        labels:
          severity: warning
          type: cpu
        annotations:
          summary: "CPU above 80%"

      - alert: HighMemory
        expr: |
          100 - (windows_os_physical_memory_free_bytes /
          windows_cs_physical_memory_bytes * 100) > 85
        for: 1m
        labels:
          severity: warning
          type: memory
        annotations:
          summary: "Memory above 85%"

      - alert: LowDisk
        expr: |
          (windows_logical_disk_free_bytes{volume="C:"} /
          windows_logical_disk_size_bytes{volume="C:"} * 100) < 15
        for: 2m
        labels:
          severity: critical
          type: disk
        annotations:
          summary: "C: drive below 15% free"

  - name: windows_processes
    rules:

      # Fires when WordPad process metrics are absent for 1 minute.
      - alert: ProcessDown
        expr: |
          absent_over_time(windows_process_cpu_time_total{
            mode="user",
            process=~"(?i)wordpad|write"
          }[1m])
        for: 30s
        labels:
          severity: critical
          type: process
        annotations:
          summary: "WordPad process is missing"

      - alert: ProcessHighCPU
        expr: |
          rate(windows_process_cpu_time_total{
            mode="user",
            process=~"(?i)wordpad|write"
          }[2m]) * 100 > 60
        for: 3m
        labels:
          severity: warning
          type: process_cpu
        annotations:
          summary: "Process {{ $labels.process }} using >60% CPU"

      - alert: ProcessHighMemory
        expr: |
          windows_process_working_set_bytes{
            process=~"(?i)wordpad|write"
          } > 1073741824
        for: 3m
        labels:
          severity: warning
          type: process_memory
        annotations:
          summary: "Process {{ $labels.process }} using >1GB RAM"

  - name: windows_services
    rules:

      - alert: ServiceDown
        expr: |
          windows_service_state{
            state="running",
            name=~"my-service|my-worker|my-api"
          } == 0
        for: 30s
        labels:
          severity: critical
          type: service
        annotations:
          summary: "Service {{ $labels.name }} is down"
