# config\prometheus\rules\windows.yml
groups:

  - name: windows_resources
    rules:

      - alert: HighCPU
        expr: |
          100 - (avg(rate(windows_cpu_time_total{mode="idle"}[2m])) * 100) > 80
        for: 1m
        labels:
          severity: warning
          type: cpu
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "CPU above 80%"

      - alert: HighMemory
        expr: |
          100 - (windows_os_physical_memory_free_bytes /
          windows_cs_physical_memory_bytes * 100) > 85
        for: 1m
        labels:
          severity: warning
          type: memory
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "Memory above 85%"

      - alert: LowDisk
        expr: |
          (windows_logical_disk_free_bytes{volume="C:"} /
          windows_logical_disk_size_bytes{volume="C:"} * 100) < 15
        for: 2m
        labels:
          severity: critical
          type: disk
          host: my-desktop
          job: windows-desktop
          env: dev
        annotations:
          summary: "C: drive below 15% free"

  # Process-specific rules are generated into:
  #   config/prometheus/rules/generated-processes.yml
  # Run:
  #   powershell -ExecutionPolicy Bypass -File .\config\prometheus\render-process-rules.ps1

  - name: windows_services
    rules:

      - alert: ServiceDown
        expr: |
          windows_service_state{
            state="running",
            name=~"my-service|my-worker|my-api"
          } == 0
        for: 30s
        labels:
          severity: critical
          type: service
        annotations:
          summary: "Service {{ $labels.name }} is down"
