server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: C:/ProgramData/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: windows-system
    windows_events:
      use_incoming_timestamp: true
      bookmark_path: C:/ProgramData/promtail/bookmark-system.xml
      eventlog_name: System
      xpath_query: "*"
      labels:
        job: windows-eventlog
        channel: System
        host: my-desktop

  - job_name: windows-application
    windows_events:
      use_incoming_timestamp: true
      bookmark_path: C:/ProgramData/promtail/bookmark-application.xml
      eventlog_name: Application
      xpath_query: "*"
      labels:
        job: windows-eventlog
        channel: Application
        host: my-desktop
