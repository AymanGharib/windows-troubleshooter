services:

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus:/etc/prometheus
    ports: ["9090:9090"]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./config/alertmanager:/etc/alertmanager
    ports: ["9093:9093"]

  loki:
    image: grafana/loki:latest
    volumes:
      - ./config/loki:/etc/loki
    ports: ["3100:3100"]

  promtail:
    # Linux-host log shipping profile only.
    # For Windows Event Logs, run promtail on the Windows host using:
    #   config/promtail/promtail-windows.yml
    profiles: ["linux-logs"]
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail/promtail-linux.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro

  
