services:

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus:/etc/prometheus
    ports: ["9090:9090"]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./config/alertmanager:/etc/alertmanager
    ports: ["9093:9093"]

  loki:
    image: grafana/loki:latest
    volumes:
      - ./config/loki:/etc/loki
    ports: ["3100:3100"]

  promtail:
    # Linux-host log shipping profile only.
    # For Windows Event Logs, run promtail on the Windows host using:
    #   config/promtail/promtail-windows.yml
    profiles: ["linux-logs"]
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail/promtail-linux.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro

  proxy:
    build:
      context:  claude-code-proxy   
    restart: unless-stopped
    env_file:
      -  claude-code-proxy\.env
    ports:
      - 8232:8232

  
  agent:
     build: 
       context: agent
     env_file:
        - agent/.env
     restart: unless-stopped